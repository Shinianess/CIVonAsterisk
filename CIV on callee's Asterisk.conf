CIV on callee 's Asterisk

[Please copy the below code in extensions.conf]


[civ]
include => civ-verify

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;CIV;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[civ-verify]

exten=>392231,1,Verbose(2,CIV Detection Start)
	;same=>n,Verbose(1,civStart:${STRFTIME(,,%Y-%m-%d %H:%M:%S.%3q)})
        ; Get caller info
        same=>n,Set(__caller_num=${CALLERID(num)})
        same=>n,Set(__caller_full=${CALLERID(all)})

        ; Read the Supported header to check for CIV support (standard method)
        same=>n,Set(supported=${PJSIP_HEADER(read,Supported)})
        same=>n,Set(has_civ_header=${REGEX("civ" ${supported} i)})
        ; Trigger CIV only if the standard Supported header contains "civ"
        same=>n,GotoIf($[${has_civ_header} = 1]?civ_detected:normal_route)

        same => n(normal_route),Verbose(2,Normal routing) 
        same => n,Set(CALLERID(name)=Unverifiable callerID)
        same => n,Dial(PJSIP/392231)
        same => n,Hangup()

        same => n(civ_detected),Verbose(2,CIV detected in ${caller_full})
        same=>n,Verbose(1,civStart:${STRFTIME(,,%Y-%m-%d %H:%M:%S.%3q)})
	same=>n,Answer(,i)
        same=>n,StartMusicOnHold(default)
        ; Retrieve the initial session ID from the incoming call's Session-ID header
        same=>n,Set(initial_full_session=${PJSIP_HEADER(read,Session-ID)})
        same=>n,Set(__initial_session_id=${CUT(initial_full_session,\;,1)})

        ; Set callback code
        same => n,Set(callback_cid=${RAND(1000,9999)})
        same => n,Verbose(2, Random number: ${callback_cid}) 
	same => n,Set(callback_target=verficall)

        ; Start callback call

        ; Generate a new session ID for the verification call itself
        same=>n,Set(__verif_session_id=${REPLACE(UUID(),-,)})
        ; Set the caller ID to the challenge
        same=>n,Set(CALLERID(num)=${callback_cid})
        ; Start the verification call (quickly terminated)
	same=>n,Verbose(1,veriCallback:${STRFTIME(,,%Y-%m-%d %H:%M:%S.%3q)})
        same=>n,Dial(PJSIP/${callback_target}@serverfr,1,b(civ_callback^s^1))
        ;Retrive code from DTMF
        same=>n,Read(DTMF,,,,2);Default timeout is 2s, the application ends with # received.
        same=>n,Verbose(1,DTMFrec:${STRFTIME(,,%Y-%m-%d %H:%M:%S.%3q)})
        same=>n,Verbose(2,Recieved code:${DTMF})
	;Matching and result display
        same=>n,Execif($["${callback_cid}" = "${DTMF}"]?Set(verify_result=Verified callerID):Set(verify_result=Spoofed callerID))
        same=>n,Set(CALLERID(num)=${caller_num})
        same=>n,Set(CALLERID(name)=${verify_result})
	same=>n,Verbose(1,civEnd:${STRFTIME(,,%Y-%m-%d %H:%M:%S.%3q)})
        same=>n,Verbose(2,Connecting to callee's endpoint...)
	same=>n,Dial(PJSIP/392231)
        same => n,Hangup()

[civ_callback]

exten=>s,1,Set(PJSIP_HEADER(add,Call-Info)=<sip:${caller_full}>\;purpose=civ-veri-call)
        same=>n,Set(PJSIP_HEADER(add,Session-ID)=${verif_session_id}\;remote=${initial_session_id}) 
        same=>n,Return()

;;;;;;;;;;;;;;;;;;;;;;;;;;;;End;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
