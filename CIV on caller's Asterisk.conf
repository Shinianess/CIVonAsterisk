CIV on caller's Asterisk

[Please copy the below code in extensions.conf]


[civ]
include => civ-verify
include => civ-initial

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;CIV;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[civ-initial]

exten=>9392231,1,Verbose(2,CIV start)
        same=>n,Verbose(1,callStart:${STRFTIME(,,%Y-%m-%d %H:%M:%S.%3q)})
        ;Generate a unique session ID for this call (32 hex digits)
        same=>n,Set(initial_session_id=${REPLACE(UUID(),-,)})
        same=>n,Set(DB(civ/session/${initial_session_id})=active)
        same=>n,Set(__CIV_SESSION=${initial_session_id})
        same=>n,Set(DB(civ/status/${CIV_SESSION})=initial)
        same=>n,Dial(PJSIP/${EXTEN:1}@serverca,,b(civ_enable^s^1)U(code_sendback))
        same=>n,Hangup()

[civ_enable]

exten=>s,1,Set(PJSIP_HEADER(add,Supported)=civ)
        ; Add required CIV headers to the initial INVITE
        same=>n,Set(PJSIP_HEADER(add,Session-ID)=${CIV_SESSION}\;remote=0000000000000000000000000000000000)
        same=>n,Return()

[code_sendback]

exten=>s,1,Verbose(2,Sending back DTMF via initial call)
        ; Retrieve the DTMF code using the session ID stored in the channel variable
        same=>n,Set(attempts=0)
        same=>n,Set(max_attempts=10)
        same=>n(loop),Verbose(3,Waiting for the secret: ${attempts})
        same=>n,Set(current_status=${DB(civ/status/${CIV_SESSION})})
        same=>n,GotoIf($["${current_status}" = "code_received"]?send)
        same=>n,Set(attempts=$[${attempts} + 1])
        same=>n,GotoIf($[${attempts} < ${max_attempts}]?wait:timeout)
        same=>n(wait),Wait(0.1)
        same=>n,Goto(loop)
        same=>n(timeout),Verbose(2,Timeout, abort)
        same=>n,Return()

        same=>n(send),Set(code=${DB(civ/code/${CIV_SESSION})})
        same=>n,Verbose(1,DTMFsendback:${STRFTIME(,,%Y-%m-%d %H:%M:%S.%3q)})
        same=>n,SendDTMF(${code}#,50,100,,)
        ; Clean up DB entries
        same=>n,Set(DB_DELETE(civ/session/${CIV_SESSION})=)
        same=>n,Set(DB_DELETE(civ/code/${CIV_SESSION})=)
        same=>n,Set(DB_DELETE(civ/status/${CIV_SESSION})=)
        same=>n,Verbose(2,Connecting to callee's endpoint...)
        same=>n,Return()

[civ-verify]

exten=>verficall,1,Verbose(2,Verify callback)
        same=>n,Verbose(1,veriCallback:${STRFTIME(,,%Y-%m-%d %H:%M:%S.%3q)})
        ; Read the Session-ID header from the incoming verification call
        same=>n,Set(full_session=${PJSIP_HEADER(read,Session-ID)})
        ; Extract the remote parameter (initial session ID) – format: "...; remote=XXXX"
        same=>n,Set(remote_session=${CUT(full_session,\;,2)})
        same=>n,Set(remote_session=${CUT(remote_session,=,2)})
        ; Check if this remote session is known (active)
        same=>n,Set(session_exists=${DB_EXISTS(civ/session/${remote_session})})
        same=>n,GotoIf($[${session_exists} = 0]?invalid)
        ; Valid session – the caller ID number contains the 4-digit challenge
        same=>n,Set(code_received=${CALLERID(num)})
        same=>n,Set(is_valid=${REGEX("^[0-9]{4}$" ${code_received})})
        same=>n,GotoIf($["${is_valid}" = "1"]?store_code:cid_fix)
        same=>n(cid_fix),Set(code_received=0000)  ; Default fallback
        same=>n(store_code),Verbose(2,code: ${code_received})
        ; Store the code under the session ID for the original call to pick up
        same=>n,Set(DB(civ/code/${remote_session})=${code_received})
        same=>n,Set(DB(civ/status/${remote_session})=code_received)
        same=>n(invalid),Set(DB(civ/status)=invalid_sessionID)

;;;;;;;;;;;;;;;;;;;;;;;;;;;;End;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;